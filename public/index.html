<!DOCTYPE html>
<html>
<head>
  <title>Credit Risk Pro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>Credit Risk Simulator</h1>
    <form id="form">
      <input type="number" placeholder="Monthly Income" id="income" required />
      <input type="number" placeholder="Monthly Expenses" id="expenses" required />
      <input type="number" placeholder="Existing Debt" id="debt" required />
      <input type="number" placeholder="Employment Years" id="employment" required />
      <input type="number" placeholder="Credit Score" id="credit" required />
      <input type="number" placeholder="Loan Amount" id="loan" required />
      <input type="number" placeholder="Loan Term (Months)" id="term" required />
      <button type="submit">Evaluate</button>
    </form>
    <div id="result"></div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
